[package]
name = "qssm-gadget"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "BLAKE3–lattice gadgets: degree-2 bit witnesses and MS Merkle helpers (QSSM integration)."

[features]
default = []
lattice-bridge = ["dep:qssm-le"]
ms-engine-b = ["dep:qssm-ms"]

[dependencies]
hex.workspace = true
qssm-le = { workspace = true, optional = true }
qssm-ms = { workspace = true, optional = true }
qssm-utils.workspace = true
serde.workspace = true
serde_json = { workspace = true, features = ["preserve_order"] }
thiserror.workspace = true
ureq.workspace = true

[dev-dependencies]
blake3.workspace = true
qssm-le.workspace = true
qssm-ms.workspace = true
qssm-wrapper.workspace = true
proptest = "1.6"
tempfile = "3"

[[test]]
name = "engine_b_binding_tests"
path = "unit_tests/engine_b_binding_tests.rs"

[[test]]
name = "full_merkle_parent_parity"
path = "unit_tests/full_merkle_parent_parity.rs"

[[test]]
name = "l2_polyops_package"
path = "unit_tests/l2_polyops_package.rs"

[[test]]
name = "ms_ghost_mirror_polyop"
path = "unit_tests/ms_ghost_mirror_polyop.rs"

[[test]]
name = "ms_merkle_roundtrip"
path = "unit_tests/ms_merkle_roundtrip.rs"

[[test]]
name = "property_tests"
path = "unit_tests/property_tests.rs"

[[test]]
name = "sovereign_digest_golden"
path = "unit_tests/sovereign_digest_golden.rs"

[[test]]
name = "sovereign_stream_checkpoint_cycle"
path = "unit_tests/sovereign_stream_checkpoint_cycle.rs"
