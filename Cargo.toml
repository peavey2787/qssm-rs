[workspace]
members = [
    "crates/qssm-common",
    "crates/qssm-utils",
    "crates/qssm-gadget",
    "crates/qssm-le",
    "crates/qssm-ms",
    "crates/mssq-batcher",
    "crates/qssm-examples",
    "crates/qssm-kaspa",
    "crates/qssm-he",
    "crates/mssq-net",
    "crates/qssm-governor",
    "crates/qssm-proofs",
    "crates/qssm-integration",
    "crates/qssm-desktop/src-tauri",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
crossterm = "0.28"
futures = "0.3"
libp2p = "0.56"
libp2p-noise = "0.46"
libp2p-yamux = "0.47"
ratatui = "0.29"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync", "time"] }
tracing = "0.1"
argon2 = "0.5"
blake3 = "1.5"
accelerometer = "0.12"
hex = "0.4"
openentropy-core = "0.12"
rayon = "1.10"
smallvec = "1.13"
ml-dsa = "0.1.0-rc.8"
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1.0"
ureq = { version = "2.10", features = ["json"] }
maxminddb = "0.24"

[profile.dev]
split-debuginfo = "unpacked"
