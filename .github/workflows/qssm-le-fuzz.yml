name: QSSM-LE Verifier Fuzz

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "truth-engine/qssm-le/**"
      - ".github/workflows/qssm-le-fuzz.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FUZZ_RUST_TOOLCHAIN: nightly-2025-06-27

jobs:
  verifier-fuzz-1h:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.FUZZ_RUST_TOOLCHAIN }}

      - name: Install cargo-fuzz
        run: cargo +${{ env.FUZZ_RUST_TOOLCHAIN }} install cargo-fuzz --locked

      - name: Verify fuzz target exists
        working-directory: truth-engine/qssm-le
        run: cargo +${{ env.FUZZ_RUST_TOOLCHAIN }} fuzz list

      - name: Run verifier fuzzing for 1 hour
        working-directory: truth-engine/qssm-le
        run: |
          cargo +${{ env.FUZZ_RUST_TOOLCHAIN }} fuzz run verify_lattice -- \
            -max_total_time=3600 \
            -print_final_stats=1 \
            -rss_limit_mb=4096

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qssm-le-fuzz-artifacts
          path: |
            truth-engine/qssm-le/fuzz/artifacts
            truth-engine/qssm-le/fuzz/corpus
          if-no-files-found: ignore
