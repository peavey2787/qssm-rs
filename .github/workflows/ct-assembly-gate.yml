name: Constant-Time Assembly Gate

on:
  pull_request:
  push:
    branches:
      - master
jobs:
  ct-assembly-inspection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify constant-time assembly gate
        run: python3 scripts/verify_ct_asm.py
