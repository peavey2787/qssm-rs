[workspace]
members = [
    "crates/qssm-common",
    "crates/qssm-utils",
    "crates/qssm-gadget",
    "crates/qssm-le",
    "crates/qssm-ms",
    "crates/mssq-batcher",
    "crates/qssm-kaspa",
    ".",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
blake3 = "1.5"
hex = "0.4"
ml-dsa = "0.1.0-rc.8"
rand = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1.0"

[package]
name = "qssm-ref"
version = "0.1.0"
edition.workspace = true
publish = false

[dependencies]
ml-dsa.workspace = true
mssq-batcher = { path = "crates/mssq-batcher" }
qssm-common = { path = "crates/qssm-common" }
qssm-kaspa = { path = "crates/qssm-kaspa" }
qssm-le = { path = "crates/qssm-le" }
qssm-ms = { path = "crates/qssm-ms" }
qssm-utils = { path = "crates/qssm-utils" }

[dev-dependencies]
ml-dsa.workspace = true
